<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة المتطور</title>
    <style>
        :root { --admin: #dc2626; --chief: #059669; --vol: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; position: relative; }
        h2 { text-align: center; color: #333; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; font-size: 16px; }
        .btn-blue { background: var(--vol); } .btn-red { background: var(--admin); } .btn-green { background: var(--chief); }
        .logout-btn { position: absolute; top: 10px; left: 10px; background: #6b7280; padding: 5px 12px; font-size: 12px; width: auto; margin: 0; }
        .hidden { display: none; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; margin-bottom: 10px; }
        .init-card { background: #f8fafc; border-right: 5px solid var(--chief); padding: 15px; margin-top: 15px; border-radius: 8px; text-align: right; }
    </style>
</head>
<body>

    <!-- 1. واجهة تسجيل الدخول -->
    <div id="login-screen" class="card">
        <h2>تسجيل الدخول</h2>
        <div class="input-group"><label>الاسم</label><input type="text" id="login-user"></div>
        <div class="input-group"><label>كلمة المرور</label><input type="password" id="login-pass"></div>
        <button class="btn-blue" onclick="handleLogin()">دخول</button>
        <p style="text-align:center">ليس لديك حساب؟ <a href="#" onclick="showScreen('signup-screen')">سجل الآن</a></p>
    </div>

    <!-- 2. واجهة إنشاء حساب -->
    <div id="signup-screen" class="card hidden">
        <h2>إنشاء حساب جديد</h2>
        <div class="input-group">
            <label>نوع الحساب</label>
            <select id="reg-role" onchange="checkAdminField()">
                <option value="volunteer">متطوع</option>
                <option value="admin">الإدارة</option>
            </select>
        </div>
        <div id="admin-secret" class="input-group hidden">
            <label style="color:var(--admin)">رمز الإدارة السري</label>
            <input type="password" id="admin-code" placeholder="أدخل 7480">
        </div>
        <div class="input-group"><label>الاسم الكامل</label><input type="text" id="reg-name"></div>
        <div class="input-group"><label>كلمة المرور</label><input type="password" id="reg-pass"></div>
        <button class="btn-blue" onclick="handleSignup()">تأكيد التسجيل</button>
        <button style="background:none; color:blue; text-decoration:underline;" onclick="showScreen('login-screen')">العودة للدخول</button>
    </div>

    <!-- 3. لوحة تحكم الإدارة -->
    <div id="admin-dashboard" class="card hidden">
        <button class="logout-btn" onclick="location.reload()">خروج</button>
        <span class="badge" style="background:var(--admin)">لوحة الإدارة</span>
        <h3>إنشاء حساب رئيس مجموعة</h3>
        <div class="input-group"><label>اسم رئيس المجموعة</label><input type="text" id="chief-name"></div>
        <div class="input-group"><label>كلمة مرور الرئيس</label><input type="password" id="chief-pass"></div>
        <button class="btn-red" onclick="createChief()">اعتماد رئيس المجموعة</button>
    </div>

    <!-- 4. لوحة رئيس المجموعة -->
    <div id="chief-dashboard" class="card hidden">
        <button class="logout-btn" onclick="location.reload()">خروج</button>
        <span class="badge" style="background:var(--chief)">رئيس المجموعة</span>
        <h3>إضافة مبادرة جديدة</h3>
        <div class="input-group"><label>عنوان المبادرة</label><input type="text" id="init-title"></div>
        <div class="input-group"><label>التفاصيل</label><textarea id="init-desc" rows="3"></textarea></div>
        <button class="btn-green" onclick="addInitiative()">نشر المبادرة للمتطوعين</button>
    </div>

    <!-- 5. واجهة المتطوع -->
    <div id="vol-dashboard" class="card hidden">
        <button class="logout-btn" onclick="location.reload()">خروج</button>
        <span class="badge" style="background:var(--vol)">حساب متطوع</span>
        <h2 id="vol-welcome"></h2>
        <h3 style="text-align:right">المبادرات المتاحة:</h3>
        <div id="initiatives-list"></div>
    </div>

    <script>
        // مصفوفة المستخدمين والمبادرات
        let users = JSON.parse(localStorage.getItem('allUsers')) || [];
        let initiatives = JSON.parse(localStorage.getItem('initiatives')) || [];

        function showScreen(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function checkAdminField() {
            const role = document.getElementById('reg-role').value;
            document.getElementById('admin-secret').classList.toggle('hidden', role !== 'admin');
        }

        function handleSignup() {
            const role = document.getElementById('reg-role').value;
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const code = document.getElementById('admin-code').value;

            if(!name || !pass) return alert("أكمل البيانات!");

            if(role === 'admin' && code !== '7480') {
                alert("رمز الإدارة خاطئ!");
                return;
            }

            // حفظ المستخدم الجديد مع نوع حسابه (Role)
            const newUser = { name, pass, role };
            users.push(newUser);
            localStorage.setItem('allUsers', JSON.stringify(users));

            alert("تم التسجيل بنجاح! نوع الحساب: " + (role === 'admin' ? 'إدارة' : 'متطوع'));
            showScreen('login-screen');
        }

        function handleLogin() {
            const userIn = document.getElementById('login-user').value;
            const passIn = document.getElementById('login-pass').value;

            // البحث عن المستخدم في القائمة المخزنة
            const foundUser = users.find(u => u.name === userIn && u.pass === passIn);

            if (foundUser) {
                if (foundUser.role === 'admin') {
                    showScreen('admin-dashboard');
                } else if (foundUser.role === 'chief') {
                    showScreen('chief-dashboard');
                } else {
                    showScreen('vol-dashboard');
                    document.getElementById('vol-welcome').innerText = "أهلاً بك يا " + foundUser.name;
                    renderInitiatives();
                }
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        }

        function createChief() {
            const name = document.getElementById('chief-name').value;
            const pass = document.getElementById('chief-pass').value;
            if(!name || !pass) return alert("أكمل البيانات!");
            
            // إضافة رئيس المجموعة لقائمة المستخدمين العامة بنوع "chief"
            users.push({ name, pass, role: 'chief' });
            localStorage.setItem('allUsers', JSON.stringify(users));
            alert("تم إنشاء حساب رئيس المجموعة بنجاح!");
        }

        function addInitiative() {
            const title = document.getElementById('init-title').value;
            const desc = document.getElementById('init-desc').value;
            if(!title || !desc) return alert("اكتب تفاصيل المبادرة!");

            initiatives.push({ title, desc });
            localStorage.setItem('initiatives', JSON.stringify(initiatives));
            alert("تم نشر المبادرة للمتطوعين!");
        }

        function renderInitiatives() {
            const list = document.getElementById('initiatives-list');
            list.innerHTML = initiatives.length === 0 ? '<p>لا توجد مبادرات حالياً.</p>' : 
                initiatives.map(i => `<div class="init-card"><strong>${i.title}</strong><p>${i.desc}</p></div>`).reverse().join('');
        }
    </script>
</body>
</html>
