<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التسجيل الذكية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .radio-box { display: flex; justify-content: space-around; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #4338ca; }
        #secret-area { display: none; margin-top: 10px; background: #fff4f4; padding: 10px; border-radius: 8px; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div class="card" id="form-container">
    <h2>إنشاء حساب</h2>
    
    <div id="register-ui">
        <!-- اختيار النوع -->
        <div class="input-group">
            <label>سجل كـ:</label>
            <div class="radio-box">
                <label><input type="radio" name="role" value="v" checked onclick="checkRole()"> متطوع</label>
                <label><input type="radio" name="role" value="m" onclick="checkRole()"> عضو</label>
            </div>
        </div>

        <!-- الاسم -->
        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="username" placeholder="اكتب اسمك هنا">
        </div>

        <!-- كلمة المرور -->
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <!-- حقل الرمز السري (يظهر للعضو فقط) -->
        <div id="secret-area">
            <label style="color: #c53030;">الرمز السري الخاص بالعضوية</label>
            <input type="text" id="secret-code" placeholder="أدخل الرمز المطلوبة">
        </div>

        <button onclick="startRegister()">سجل الآن</button>
    </div>

    <!-- واجهة النجاح -->
    <div id="success-ui" style="display:none;">
        <h1 style="color: #22c55e;">✅</h1>
        <h2 id="welcome-msg">مرحباً بك!</h2>
        <p>تم حفظ بياناتك بنجاح.</p>
        <button onclick="location.reload()" style="background:#6b7280;">العودة</button>
    </div>
</div>

<script>
    // وظيفة تبديل الحقول بناءً على الاختيار
    function checkRole() {
        const roles = document.getElementsByName('role');
        const secretArea = document.getElementById('secret-area');
        if (roles[1].checked) { // إذا اختار عضو
            secretArea.style.display = 'block';
        } else {
            secretArea.style.display = 'none';
        }
    }

    // وظيفة الزر الرئيسي
    function startRegister() {
        const name = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const isMember = document.getElementsByName('role')[1].checked;
        const secret = document.getElementById('secret-code').value;

        // التحقق من البيانات
        if (name === "" || pass === "") {
            alert("أرجوك عبّي الاسم وكلمة المرور أولاً!");
            return;
        }

        // التحقق من الرمز السري إذا كان عضواً
        if (isMember && secret !== "7480") {
            alert("عذراً! الرمز السري للعضوية خاطئ.");
            return;
        }

        // إذا كل شيء تمام، اظهر رسالة الترحيب
        document.getElementById('register-ui').style.display = 'none';
        document.getElementById('success-ui').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "مرحباً يا " + name;
    }
</script>

</body>
</html>
