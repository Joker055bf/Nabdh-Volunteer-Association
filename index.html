<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التسجيل | متطوع وعضو</title>
    <style>
        :root { --primary: #4f46e5; --error: #ef4444; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; justify-content: center; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #4338ca; }
        #member-code-area { display: none; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .footer-link { margin-top: 15px; font-size: 14px; display: block; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <!-- واجهة التسجيل -->
    <div class="card" id="main-card">
        <h2 id="form-title">إنشاء حساب جديد</h2>
        
        <div id="register-fields">
            <div class="input-group">
                <label>نوع الحساب</label>
                <div class="radio-group">
                    <label><input type="radio" name="userType" value="volunteer" checked onclick="toggleMemberCode(false)"> متطوع</label>
                    <label><input type="radio" name="userType" value="member" onclick="toggleMemberCode(true)"> عضو</label>
                </div>
            </div>

            <div class="input-group">
                <label>الاسم</label>
                <input type="text" id="reg-name" placeholder="ادخل اسمك">
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="reg-pass" placeholder="••••••••">
            </div>

            <!-- حقل الرمز السري للعضو فقط -->
            <div class="input-group" id="member-code-area">
                <label style="color: var(--primary);">الرمز السري للعضوية</label>
                <input type="text" id="member-code" placeholder="ادخل الرمز 7480">
            </div>

            <button onclick="handleRegister()">تسجيل حساب جديد</button>
        </div>

        <!-- واجهة الترحيب (تظهر بعد النجاح) -->
        <div id="welcome-area" style="display: none;">
            <div style="font-size: 50px;">🎉</div>
            <h2 id="welcome-msg">مرحباً!</h2>
            <p>تم حفظ بياناتك بنجاح في قاعدة البيانات.</p>
            <button onclick="location.reload()" style="background: #6b7280;">خروج</button>
        </div>
    </div>

    <script>
        // إظهار/إخفاء حقل الرمز السري
        function toggleMemberCode(show) {
            document.getElementById('member-code-area').style.display = show ? 'block' : 'none';
        }

        // وظيفة التسجيل الرئيسية
        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const type = document.querySelector('input[name="userType"]:checked').value;
            const code = document.getElementById('member-code').value;

            // 1. التأكد من تعبئة البيانات
            if (!name || !pass) {
                alert("يرجى كتابة الاسم وكلمة المرور!");
                return;
            }

            // 2. التأكد من رمز العضوية إذا اختار "عضو"
            if (type === 'member' && code !== '7480') {
                alert("الرمز السري للعضو خاطئ! يرجى إدخال 7480");
                return;
            }

            // 3. هنا سيتم الربط مع Firebase لاحقاً
            console.log("بيانات جاهزة للحفظ:", { name, pass, type });
            
            // إظهار رسالة النجاح
            showWelcome(name, type);
        }

        function showWelcome(name, type) {
            document.getElementById('register-fields').style.display = 'none';
            document.getElementById('welcome-area').style.display = 'block';
            const typeAr = (type === 'member') ? 'العضو' : 'المتطوع';
            document.getElementById('welcome-msg').innerText = `مرحباً بك يا ${name} (${typeAr})`;
        }
    </script>

</body>
</html>
