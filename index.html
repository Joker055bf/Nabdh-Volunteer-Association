<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي | الترحيب</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: #4b3f92; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary-color); }
        
        button {
            width: 100%; padding: 14px; background: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: #4338ca; transform: translateY(-2px); }

        .footer-links { margin-top: 20px; font-size: 14px; }
        .footer-links a { color: var(--primary-color); text-decoration: none; font-weight: bold; }

        /* واجهة الترحيب */
        #welcome-screen { display: none; }
        .welcome-icon { font-size: 60px; margin-bottom: 20px; }
        .logout-btn { background: #ef4444; margin-top: 30px; }
        .logout-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

    <!-- 1. نموذج تسجيل الدخول -->
    <div class="card" id="login-form">
        <h2>تسجيل الدخول</h2>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="login-email" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button onclick="login()">دخول</button>
        <div class="footer-links">
            ليس لديك حساب؟ <a href="#" onclick="showSection('signup-form')">سجل الآن</a>
        </div>
    </div>

    <!-- 2. نموذج إنشاء حساب -->
    <div class="card" id="signup-form" style="display: none;">
        <h2>إنشاء حساب جديد</h2>
        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="user-name" placeholder="اسمك الكريم">
        </div>
        <div class="input-group">
