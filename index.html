<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي - تسجيل الدخول</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ea44f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        .toggle-link { margin-top: 15px; display: block; color: #0969da; text-decoration: none; font-size: 14px; }
        .toggle-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container" id="login-form">
    <h2>تسجيل الدخول</h2>
    <input type="text" placeholder="اسم المستخدم أو البريد">
    <input type="password" placeholder="كلمة المرور">
    <button onclick="alert('أهلاً بك! (هذا مجرد شكل حالياً)')">دخول</button>
    <a href="#" class="toggle-link" onclick="toggleForms()">ليس لديك حساب؟ سجل الآن</a>
</div>

<div class="container" id="signup-form" style="display: none;">
    <h2>إنشاء حساب جديد</h2>
    <input type="text" placeholder="الاسم الكامل">
    <input type="email" placeholder="البريد الإلكتروني">
    <input type="password" placeholder="كلمة المرور">
    <button onclick="alert('تم التسجيل! (هذا مجرد شكل حالياً)')">إنشاء الحساب</button>
    <a href="#" class="toggle-link" onclick="toggleForms()">لديك حساب بالفعل؟ سجل دخول</a>
</div>

<script>
    function toggleForms() {
        const login = document.getElementById('login-form');
        const signup = document.getElementById('signup-form');
        if (login.style.display === 'none') {
            login.style.display = 'block';
            signup.style.display = 'none';
        } else {
            login.style.display = 'none';
            signup.style.display = 'block';
        }
    }
</script>

</body>
</html>
