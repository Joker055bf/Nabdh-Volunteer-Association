<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصتي | تسجيل ودخول</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* الحاوية الرئيسية */
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; position: relative; }

        /* تنسيق المدخلات */
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; }
        .type-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }

        /* الأزرار */
        .main-btn { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .logout-btn { position: absolute; top: 10px; left: 10px; background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* إخفاء الأقسام */
        #member-code-div, #main-content { display: none; }
    </style>
</head>
<body>

    <!-- 1. واجهة التسجيل -->
    <div class="container" id="auth-section">
        <h2 style="text-align: center;">إنشاء حساب</h2>
        
        <div class="input-group">
            <label>سجل كـ:</label>
            <div class="type-selector">
                <div id="v-btn" class="type-btn active" onclick="setType('volunteer')">متطوع</div>
                <div id="m-btn" class="type-btn" onclick="setType('member')">عضو</div>
            </div>
        </div>

        <div class="input-group">
            <label>الاسم</label>
            <input type="text" id="username" placeholder="اكتب اسمك">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="input-group" id="member-code-div">
            <label style="color: #ef4444;">الرمز السري (7480)</label>
            <input type="text" id="secret-code" placeholder="أدخل الرمز">
        </div>

        <button class="main-btn" onclick="handleRegister()">سجل الآن</button>
    </div>

    <!-- 2. واجهة الموقع بعد الدخول -->
    <div class="container" id="main-content">
        <button class="logout-btn" onclick="logout()">خروج</button>
        <h2 style="text-align: center;">مرحباً بك!</h2>
        <p style="text-align: center;">أهلاً يا <span id="display-name" style="font-weight: bold; color: #4f46e5;"></span>، لقد دخلت إلى حسابك بنجاح.</p>
        <div style="background: #f0fdf4; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #bbf7d0;">
            لقد تم تسجيلك كـ <span id="display-type"></span>
        </div>
    </div>

    <script>
        let selectedType = 'volunteer';

        // وظيفة اختيار النوع (متطوع/عضو)
        function setType(type) {
            selectedType = type;
            document.getElementById('v-btn').className = (type === 'volunteer') ? 'type-btn active' : 'type-btn';
            document.getElementById('m-btn').className = (type === 'member') ? 'type-btn active' : 'type-btn';
            document.getElementById('member-code-div').style.display = (type === 'member') ? 'block' : 'none';
        }

        // وظيفة التسجيل والدخول
        function handleRegister() {
            const name = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const code = document.getElementById('secret-code').value;

            // التأكد من البيانات
            if (!name || !pass) {
                alert("الرجاء إكمال البيانات!");
                return;
            }

            // التأكد من رمز العضو
            if (selectedType === 'member' && code !== '7480') {
                alert("الرمز السري للعضوية خاطئ!");
                return;
            }

            // إخفاء التسجيل وإظهار المحتوى (الدخول الفوري)
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // عرض الاسم والنوع
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-type').innerText = (selectedType === 'volunteer') ? "متطوع" : "عضو";
        }

        // وظيفة الخروج
        function logout() {
            // إعادة تحميل الصفحة يصفر كل شيء ويرجعك للبداية
            location.reload();
        }
    </script>

</body>
</html>
